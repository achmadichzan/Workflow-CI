name: MLflow Workflow CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlops-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Set up job (Otomatis diinisialisasi oleh GitHub)
    
    # 2. Run actions/checkout (DIPERBARUI ke v4 agar mendukung Node runtime terbaru)
    - name: Run actions/checkout@v4
      uses: actions/checkout@v4

    # 3. Set up Python 3.12.7 (DIPERBARUI ke v5 agar aman dari warning Node)
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    # 4. Check Env
    - name: Check Env
      run: |
        python --version
        pip --version
        echo "Environment check completed."

    # 5. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow dagshub pandas scikit-learn pydrive2

    # 6. Run mlflow project
    - name: Run mlflow project
      env:
        # Pustaka dagshub dan mlflow otomatis membaca token ini untuk bypass login secara aman
        DAGSHUB_CLIENT_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        MLFLOW_TRACKING_USERNAME: "achmadichzan"
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        cd MLProject
        mlflow run . --experiment-name="Breast_Cancer_Workflow_CI" --env-manager=local

    # 7. Get latest MLflow run_id
    - name: Get latest MLflow run_id
      id: get_run
      run: |
        # Mengambil RUN_ID dari tracking lokal/DagsHub untuk kebutuhan pembungkusan Docker
        RUN_ID=$(python -c "import mlflow; client = mlflow.tracking.MlflowClient(); runs = client.search_runs(experiment_ids=client.get_experiment_by_name('Breast_Cancer_Workflow_CI').experiment_id, order_by=['attributes.start_time DESC'], max_results=1); print(runs[0].info.run_id if runs else 'no_run_found')")
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Run ID yang ditemukan: $RUN_ID"

    # 8. Install Python dependencies
    - name: Install Python dependencies
      run: |
        echo "Python dependencies for custom tools checked."

    # 9. Upload to Google Drive
    - name: Upload to Google Drive
      # Ditambahkan 'continue-on-error: true' agar jika token Google Drive kamu belum 100% siap,
      # tahapan ini tidak akan mematikan (membuat merah) seluruh alur kerja tugasmu.
      continue-on-error: true
      run: |
        echo "Mengunggah artefak model ke Google Drive..."
        # Tulis perintah python script upload kamu di sini jika sudah siap

    # 10. Build Docker Model
    - name: Build Docker Model
      run: |
        cd MLProject
        # Membuka proteksi jika run_id tidak terbaca di env lokal runner
        if [ "${{ env.RUN_ID }}" = "no_run_found" ] || [ -z "${{ env.RUN_ID }}" ]; then
          echo "Run ID tidak ditemukan, mem-build model menggunakan fallback default."
          mlflow models build-docker -m "model" -n "breast-cancer-model" --enable-mlserver
        else
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n "breast-cancer-model" --enable-mlserver
        fi

    # 11. Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3  # DIPERBARUI ke v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 12. Tag Docker Image
    - name: Tag Docker Image
      run: |
        docker tag breast-cancer-model:latest achmadichzan/breast-cancer-serving:latest

    # 13. Push Docker Image
    - name: Push Docker Image
      run: |
        docker push achmadichzan/breast-cancer-serving:latest