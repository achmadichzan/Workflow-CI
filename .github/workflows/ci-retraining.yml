name: MLflow Workflow CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlops-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Set up job (Otomatis diinisialisasi oleh GitHub)
    
    # 2. Run actions/checkout (DIPERBARUI ke v4 agar mendukung Node runtime terbaru)
    - name: Run actions/checkout@v4
      uses: actions/checkout@v4

    # 3. Set up Python 3.12.7 (DIPERBARUI ke v5 agar aman dari warning Node)
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    # 4. Check Env
    - name: Check Env
      run: |
        python --version
        pip --version
        echo "Environment check completed."

    # 5. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow dagshub pandas scikit-learn pydrive2

    # 6. Run mlflow project & Tangkap Run ID Secara Langsung
    - name: Run mlflow project
      env:
        MLFLOW_TRACKING_URI: "https://dagshub.com/achmadichzan/Eksperimen_SML_Achmadichzan.mlflow"
        MLFLOW_TRACKING_USERNAME: "achmadichzan"
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        cd MLProject
        # Jalankan MLflow dan simpan seluruh teks log output ke dalam file temp_log.txt
        mlflow run . --experiment-name="Breast_Cancer_Workflow_CI" --env-manager=local | tee temp_log.txt
        
        # Ekstrak ID run dari teks log menggunakan penanda kata 'ID'
        RUN_ID=$(grep -oP "Run \(ID '\K[^']+" temp_log.txt || echo "no_run_found")
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Run ID berhasil diamankan: $RUN_ID"

    # 7. Verifikasi MLflow run_id (Menggantikan script Python lama yang error)
    - name: Get latest MLflow run_id
      run: |
        echo "Menggunakan RUN_ID dari env: ${{ env.RUN_ID }}"
        if [ "${{ env.RUN_ID }}" = "no_run_found" ] || [ -z "${{ env.RUN_ID }}" ]; then
          echo "Peringatan: Gagal menangkap RUN_ID dari log eksekusi."
        fi

    # 8. Install Python dependencies
    - name: Install Python dependencies
      run: |
        echo "Python dependencies for custom tools checked."

    # 9. Upload to Google Drive
    - name: Upload to Google Drive
      # Ditambahkan 'continue-on-error: true' agar jika token Google Drive kamu belum 100% siap,
      # tahapan ini tidak akan mematikan (membuat merah) seluruh alur kerja tugasmu.
      continue-on-error: true
      run: |
        echo "Mengunggah artefak model ke Google Drive..."
        # Tulis perintah python script upload kamu di sini jika sudah siap

    # 10. Build Docker Model
    - name: Build Docker Model
      run: |
        cd MLProject
        # Membuka proteksi jika run_id tidak terbaca di env lokal runner
        if [ "${{ env.RUN_ID }}" = "no_run_found" ] || [ -z "${{ env.RUN_ID }}" ]; then
          echo "Run ID tidak ditemukan, mem-build model menggunakan fallback default."
          mlflow models build-docker -m "model" -n "breast-cancer-model" --enable-mlserver
        else
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n "breast-cancer-model" --enable-mlserver
        fi

    # 11. Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3  # DIPERBARUI ke v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 12. Tag Docker Image
    - name: Tag Docker Image
      run: |
        docker tag breast-cancer-model:latest achmadichzan/breast-cancer-serving:latest

    # 13. Push Docker Image
    - name: Push Docker Image
      run: |
        docker push achmadichzan/breast-cancer-serving:latest